# ─────────────────────────────────────────────────────────────────────────────
# आरोग्य संपन्न वारी — serve offline map tiles fast & at scale
# Fixes: "map randomly fails to load for some users when many people access."
# Cause: each map view = 10–20 small tile files. Without cache headers, every
# browser re-requests them on every visit, and nginx stat()/open()s each file
# per request → under heavy concurrency some requests get starved (connection /
# file-descriptor limits) and a few users see a partially blank map.
# This makes the browser cache each tile permanently and lets nginx cache open
# file handles, so repeat + concurrent traffic barely touches the server.
# ─────────────────────────────────────────────────────────────────────────────

# 1) INSIDE the  server { }  block for wari.maharashtra.gov.in — add this location
#    ABOVE any generic "location /" so it wins for tile requests:

location /assets/tiles/ {
    # Tiles never change → let the browser keep them for a year and never re-ask.
    expires 365d;
    add_header Cache-Control "public, immutable";
    # A stray tile that isn't bundled → return an empty 204 instead of a 404,
    # and don't spam the error log (this is what filled your logs).
    try_files $uri =204;
    access_log off;
}

# 2) INSIDE the  http { }  block (e.g. /etc/nginx/nginx.conf) — cache open file
#    handles so nginx doesn't re-open each tile from disk on every request:

#   open_file_cache          max=50000 inactive=5m;
#   open_file_cache_valid    5m;
#   open_file_cache_min_uses 1;
#   open_file_cache_errors   on;

# 3) Raise concurrency headroom. In the MAIN context (top of nginx.conf):

#   worker_processes      auto;
#   worker_rlimit_nofile  65535;

#   And in the  events { }  block:

#   events { worker_connections 8192; }

# 4) Apply:
#   sudo nginx -t && sudo systemctl reload nginx
#   ("nginx -t" must say "syntax is ok / test is successful" before reload.)

# ─────────────────────────────────────────────────────────────────────────────
# NOTE: installed-app (PWA) users already cache tiles in the service worker and
# don't hit the server after first load — this block mainly protects first-time
# and plain-browser users, which is exactly the group that fails under a spike.
# ─────────────────────────────────────────────────────────────────────────────
