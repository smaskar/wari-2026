# ─────────────────────────────────────────────────────────────────────────────
# Wari usage analytics — self-hosted, anonymous, no database.
# The app sends one beacon on EVERY app open to /api/hit. nginx logs it and returns 204.
# NO IP address and NO name are stored — only a random install id, open time, and
# non-identifying device context (screen, timezone, language, PWA flag, User-Agent).
# ─────────────────────────────────────────────────────────────────────────────

# 1) Add this ONCE at the http { } level (e.g. in /etc/nginx/nginx.conf, inside http{}).
#    Note: deliberately NO $remote_addr — we do not log IPs.
#    $http_user_agent gives device model / browser / OS. $time_iso8601 = server receive time;
#    $arg_t = client open time (epoch ms) — accurate even for pings queued while offline.
#
#    log_format wari_hit '$time_iso8601 uid=$arg_u t=$arg_t e=$arg_e k=$arg_k near=$arg_near '
#                        'scr=$arg_s tz=$arg_tz lang=$arg_lang pwa=$arg_pwa dpr=$arg_dpr '
#                        'ver=$arg_v ua="$http_user_agent"';

# 2) Add this location INSIDE the server { } block for wari.maharashtra.gov.in:

location = /api/hit {
    access_log /var/log/nginx/wari-hits.log wari_hit;
    add_header Cache-Control "no-store";
    return 204;
}

# 3) Reload nginx:  sudo nginx -t && sudo systemctl reload nginx
# 4) Ensure the log is rotated (logrotate usually already covers /var/log/nginx/*.log).
# 5) Read the numbers:  ./wari-usage.sh /var/log/nginx/wari-hits.log
#
# RECOMMENDED — full visual dashboard (devices, browsers, OS, hits over time) with GoAccess.
# GoAccess parses the User-Agent automatically, so point it at the COMBINED access log
# (which has $http_user_agent in the standard format) filtered to /api/hit, or simply:
#    sudo apt-get install goaccess
#    goaccess /var/log/nginx/access.log --log-format=COMBINED -o /var/www/wari/stats.html \
#             --html-report-title="Wari usage" -a
# (protect stats.html behind auth or keep it off the public web root.)
