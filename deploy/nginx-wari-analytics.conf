# ─────────────────────────────────────────────────────────────────────────────
# Wari usage analytics — self-hosted, anonymous, no database.
# The app POSTs one beacon per device per day to /api/hit. nginx logs it and returns 204.
# NO IP address and NO personal data are stored — only a random install id, the date, and
# the app version. This is the whole backend: just logging.
# ─────────────────────────────────────────────────────────────────────────────

# 1) Add this ONCE at the http { } level (e.g. in /etc/nginx/nginx.conf, inside http{}).
#    Note: deliberately NO $remote_addr — we do not log IPs.
#
#    log_format wari_hit '$time_iso8601 uid=$arg_u day=$arg_d ver=$arg_v';

# 2) Add this location INSIDE the server { } block for wari.maharashtra.gov.in:

location = /api/hit {
    access_log /var/log/nginx/wari-hits.log wari_hit;
    add_header Cache-Control "no-store";
    return 204;
}

# 3) Reload nginx:  sudo nginx -t && sudo systemctl reload nginx
# 4) Make sure the log is readable and rotated (logrotate usually already covers /var/log/nginx/*.log).
# 5) Read the numbers any time with:  ./wari-usage.sh /var/log/nginx/wari-hits.log
#
# Optional visual dashboard (if GoAccess is installed):
#    goaccess /var/log/nginx/wari-hits.log --log-format='%d uid=%^ day=%^ ver=%^' -o report.html
