<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>वारी सहाय्य · मदत नकाशा</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *{box-sizing:border-box}html,body,#map{width:100%;height:100%;margin:0}body{font-family:system-ui,'Noto Sans Devanagari',Arial,sans-serif;background:#eadfc8;color:#23160d}.topbar{position:absolute;z-index:900;top:14px;left:14px;right:14px;display:flex;gap:10px;align-items:flex-start;justify-content:space-between;pointer-events:none}.panel{pointer-events:auto;background:#fff8e8;border:1px solid #ead8bc;border-radius:18px;box-shadow:0 12px 30px #0002;padding:10px 12px;max-width:650px}.title{font-size:16px;font-weight:950;margin:0}.sub{font-size:12px;color:#6f5b44;font-weight:850;margin-top:2px}.filter-title{font-size:11px;color:#8b6b47;font-weight:950;margin:9px 0 4px;letter-spacing:.04em}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{border:1px solid #ead8bc;background:white;border-radius:999px;padding:7px 10px;font-weight:950;font-size:12px;color:#4b3b2b;cursor:pointer}.chip.active{background:#23160d;color:white}.legend{pointer-events:auto;display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.legend span{background:#fff8e8;border:1px solid #ead8bc;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950;box-shadow:0 10px 20px #0001}.pin{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:white;border:2px solid white;box-shadow:0 2px 9px #0005;font-size:16px}.pin.ambulance{background:#e52920}.pin.health{background:#159653}.pin.halt{background:#9b5b00}.pin.water{background:#2f8fcf}.pin.other{background:#2f6fd6}.leaflet-popup-content{font-family:system-ui,'Noto Sans Devanagari',Arial,sans-serif;font-size:13px;line-height:1.35}.leaflet-popup-content b{font-weight:950}.leaflet-popup-content a{font-weight:950;color:#0b67c2;text-decoration:none}@media(max-width:700px){.topbar{display:block}.legend{margin-top:8px;justify-content:flex-start}.panel{max-width:none}.chips{overflow-x:auto;flex-wrap:nowrap}.chip{white-space:nowrap}}
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="topbar">
    <div class="panel">
      <div class="title">वारी सहाय्य · मदत नकाशा</div>
      <div class="sub"><span id="count">0</span> मदत केंद्रे · same data as app</div>
      <div class="filter-title">पालखी</div>
      <div class="chips" id="palkhiChips">
        <button class="chip active" data-palkhi="all">दोन्ही पालख्या</button>
        <button class="chip" data-palkhi="dnyaneshwar">श्री संत ज्ञानेश्वर महाराज</button>
        <button class="chip" data-palkhi="tukaram">जगद्गुरू श्री संत तुकाराम महाराज</button>
      </div>
      <div class="filter-title">मदत प्रकार</div>
      <div class="chips" id="typeChips">
        <button class="chip active" data-filter="all">सर्व</button>
        <button class="chip" data-filter="ambulance">🚑 रुग्णवाहिका</button>
        <button class="chip" data-filter="health">🏥 आरोग्य</button>
        <button class="chip" data-filter="halt">⛺ मुक्काम</button>
        <button class="chip" data-filter="satara">Satara</button>
      </div>
    </div>
    <div class="legend"><span>🚑 रुग्णवाहिका</span><span>🩺 डॉक्टर/PHC</span><span>🏥 रुग्णालय</span><span>⛺ मुक्काम</span></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./wari-points-1.js"></script>
  <script src="./wari-points-2.js"></script>
  <script src="./wari-points-3.js"></script>
  <script src="./wari-points-4.js"></script>
  <script src="./wari-points-5.js"></script>
  <script src="./wari-points-tukaram.js"></script>
  <script src="./wari-points-dnyaneshwar-halts.js"></script>
  <script src="./wari-points-tukaram-halts.js"></script>
  <script src="./wari-points-satara.js"></script>
  <script src="./wari-data.js"></script>
  <script>
    const W=window.WariData, POINTS=W.build();
    const map=L.map('map',{zoomControl:false}).setView([18.42,74.10],9);L.control.zoom({position:'bottomright'}).addTo(map);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
    let layer=L.layerGroup().addTo(map),typeFilter='all',palkhiFilter='all';
    function typeKeep(p){return typeFilter==='all'||typeFilter==='ambulance'&&W.hasAmb(p)||typeFilter==='health'&&W.hasHealth(p)||typeFilter==='halt'&&W.isHalt(p)||typeFilter==='satara'&&W.isSatara(p)}
    function palkhiKeep(p){return palkhiFilter==='all'||p.palkhi===palkhiFilter}
    function keep(p){return palkhiKeep(p)&&typeKeep(p)}
    function dir(p){return`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`}
    function popup(p){let c=W.tel(p.call),rows=[];if(p.place)rows.push('<b>ठिकाण:</b> '+W.esc(p.place));if(p.vehicle)rows.push('<b>वाहन क्रमांक:</b> '+W.esc(p.vehicle));if(p.doctor)rows.push('<b>डॉक्टर/EMSO:</b> '+W.esc(p.doctor));if(p.pilot)rows.push('<b>पायलट/EA:</b> '+W.esc(p.pilot));if(p.base)rows.push('<b>बेस:</b> '+W.esc(p.base));if(p.date)rows.push('<b>तारीख:</b> '+W.esc(p.date));return `<b>${W.icon(p)} ${W.esc(p.label)}</b><br><small>${W.esc(W.NAMES[p.palkhi]||p.palkhi)}${W.isSatara(p)?' · Satara':''}</small><br>${rows.join('<br>')}<br>${c?`<a href="tel:${c}">📞 फोन करा</a> · `:''}<a target="_blank" href="${dir(p)}">दिशा</a>`}
    function draw(){layer.clearLayers();let pts=POINTS.filter(keep);document.getElementById('count').textContent=pts.length;pts.forEach(p=>L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',html:`<div class="pin ${W.cls(p)}">${W.icon(p)}</div>`,iconSize:[30,30],iconAnchor:[15,15]})}).bindPopup(popup(p)).addTo(layer));if(pts.length){map.fitBounds(L.latLngBounds(pts.map(p=>[p.lat,p.lng])).pad(.1));}}
    function setPalkhi(p){palkhiFilter=p||'all';document.querySelectorAll('#palkhiChips .chip').forEach(x=>x.classList.toggle('active',x.dataset.palkhi===palkhiFilter));draw()}
    function setType(f){typeFilter=f||'all';document.querySelectorAll('#typeChips .chip').forEach(x=>x.classList.toggle('active',x.dataset.filter===typeFilter));draw()}
    document.querySelectorAll('#palkhiChips .chip').forEach(b=>b.addEventListener('click',()=>setPalkhi(b.dataset.palkhi)));
    document.querySelectorAll('#typeChips .chip').forEach(b=>b.addEventListener('click',()=>setType(b.dataset.filter)));
    window.addEventListener('message',e=>{if(e.data&&e.data.type==='PALKHI_FILTER')setPalkhi(e.data.palkhi||'all')});
    draw();
  </script>
</body>
</html>
